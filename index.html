<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ИИ-Издательство · Конвейер</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body data-view="canvas">
<header class="topbar">
  <div class="brand"><span class="brand-dot"></span> ИИ-Издательство</div>
  <input id="proj-title" class="title-input" placeholder="Название книги…">
  <span id="style-ref-badge" class="hint-pill" title="Стиль-ориентир задан — агенты пишут в вашем голосе" style="display:none;color:var(--ok)">✍️ стиль</span>
  <button class="btn primary" data-action="run" id="run-btn" title="Запустить создание книги (команда агентов по порядку)">▶ Запустить</button>
  <button class="btn danger" data-action="stop" id="stop-btn" style="display:none" title="Остановить создание">■ Стоп</button>
  <div class="spacer"></div>
  <span class="hint-pill" id="cost-state" title="Суммарная стоимость токенов">Σ $0.00</span>
  <span class="hint-pill backup-ok" id="backup-state" title="Статус резервного копирования" style="display:none">💾</span>
  <span class="hint-pill" id="api-state" title="Статус API-ключа">● ключ не задан</span>
  <button class="btn ghost" data-action="settings" title="Глобальные настройки: API-ключ, модель, лимиты">⚙ Настройки</button>
</header>

<div class="studio" id="studio">
<aside class="left-rail" id="left-rail">
  <!-- статический раздел «Проект» — renderLeftRail() его НЕ трогает -->
  <div id="lr-project">
    <div class="lr-sec-label">Проект</div>
    <div class="lrp-field">
      <label for="proj-genre">Жанр</label>
      <select id="proj-genre">
        <option value="">— выбрать жанр —</option>
      </select>
    </div>
    <div class="lrp-field">
      <label for="proj-aud">Аудитория</label>
      <input id="proj-aud" placeholder="взрослые 25-45, подростки…">
    </div>
    <div class="lrp-field">
      <label for="proj-brief">О чём книга</label>
      <textarea id="proj-brief" rows="3" placeholder="Кто герой, в чём конфликт, чем заканчивается"></textarea>
    </div>
    <label class="lrp-toggle" title="Включить если хотите улучшить готовый текст, а не писать с нуля">
      <input type="checkbox" id="proj-edit-mode"> 📄 Редактировать исходник
    </label>
  </div>
  <!-- динамический раздел — renderLeftRail() пишет сюда -->
  <div id="lr-body"><!-- заполняется renderLeftRail() --></div>
</aside>
<div class="main-pane" id="main-pane">
<div class="viewbar" id="viewbar">
  <button class="lr-toggle" id="lr-toggle" data-action="toggle-rail" title="Свернуть/развернуть боковую панель">◀</button>
  <button class="view-tab" id="tab-reader" data-action="switch-view" data-view="reader">📖 Книга</button>
  <button class="view-tab active" id="tab-canvas" data-action="switch-view" data-view="canvas">🗺 Схема</button>
  <button class="view-tab" id="tab-simple" data-action="switch-view" data-view="simple">✨ Просто</button>
  <button class="view-tab" id="tab-world" data-action="switch-view" data-view="world">🌍 Мир</button>
</div>
<div class="canvas" id="canvas">
  <svg class="edges" id="edges"></svg>
  <div class="nodes" id="nodes"></div>
  <div class="canvas-hint" id="canvas-hint"></div>
</div>

<div class="reader" id="reader"><div class="reader-inner" id="reader-inner"></div></div>
<div class="world-view" id="world-view" style="display:none">
  <div class="world-inner" id="world-inner"></div>
</div>
<div class="simplified" id="simplified" style="display:none">
  <div class="simplified-inner">
    <!-- Шаги мастера -->
    <div class="wiz-steps" id="wiz-steps">
      <div class="wiz-step active" data-step="1"><span class="wiz-num">1</span><span class="wiz-lbl">О книге</span></div>
      <div class="wiz-arrow">→</div>
      <div class="wiz-step" data-step="2"><span class="wiz-num">2</span><span class="wiz-lbl">Замысел</span></div>
      <div class="wiz-arrow">→</div>
      <div class="wiz-step" data-step="3"><span class="wiz-num">3</span><span class="wiz-lbl">Написать</span></div>
    </div>

    <!-- Шаг 1: О книге -->
    <div class="wiz-panel" id="wiz-step-1">
      <h2 class="simp-title">Расскажите о своей книге</h2>
      <div class="simp-field">
        <label>📖 Название</label>
        <input id="simp-title" placeholder="Например: «Последний вагон»" />
      </div>
      <div class="simp-field">
        <label>🎭 О чём книга <span class="required">*</span></label>
        <textarea id="simp-brief" rows="4" placeholder="Кто главный герой, в чём конфликт, что происходит. Чем подробнее — тем лучше получится книга."></textarea>
      </div>
      <div class="simp-row">
        <div class="simp-field">
          <label>📚 Жанр</label>
          <select id="simp-genre"><option value="">— выбрать —</option></select>
        </div>
        <div class="simp-field">
          <label>👥 Аудитория</label>
          <input id="simp-aud" placeholder="взрослые 25-45" />
        </div>
      </div>
      <div class="simp-field">
        <label>📏 Объём</label>
        <div class="simp-tpl-row" id="simp-tpl-row"><!-- шаблоны --></div>
      </div>
      <button class="btn primary lg" id="wiz-next-1">Далее: создать замысел →</button>
      <button class="btn ghost sm simp-expert" id="simp-to-expert">Перейти в режим эксперта</button>
    </div>

    <!-- Шаг 2: Замысел (персонажи, мир, повороты) -->
    <div class="wiz-panel" id="wiz-step-2" style="display:none">
      <h2 class="simp-title">Замысел книги</h2>
      <p class="simp-hint-text">ИИ предложил персонажей и сюжетные повороты. Проверьте и подправьте — это уйдёт канон всем агентам.</p>
      <div id="wiz-concept-body"><!-- заполняется JS --></div>
      <div class="wiz-step2-btns">
        <button class="btn ghost" id="wiz-back-1">← Назад</button>
        <button class="btn ghost" id="wiz-regen">🔄 Перегенерировать</button>
        <button class="btn primary lg" id="wiz-next-2">Всё верно — писать книгу! →</button>
      </div>
    </div>

    <!-- Шаг 3: Прогресс написания -->
    <div class="wiz-panel" id="wiz-step-3" style="display:none">
      <h2 class="simp-title" id="wiz-running-title">Команда агентов пишет книгу…</h2>
      <div class="simp-progress" id="simp-progress"></div>
      <button class="btn ghost sm" id="simp-to-expert" style="margin-top:16px">Посмотреть процесс на схеме</button>
    </div>
    <div class="simp-progress" id="simp-progress" style="display:none"></div>
  </div>
</div>
</div><!-- /#main-pane -->
<aside class="book-inspector" id="book-inspector"><!-- renderBookInspector() пишет сюда; виден только в view=reader --></aside>
</div><!-- /#studio -->
<div id="attention-bar" class="attention-bar" style="display:none"></div>
<div class="completion-banner" id="completion-banner" style="display:none">
  <div class="cb-text">✅ <span id="cb-stats">Книга готова!</span></div>
  <div class="cb-btns">
    <button class="btn danger sm" id="cb-retry" style="display:none">↻ Повторить упавшие</button>
    <button class="btn ok sm" id="cb-read">📖 Читать</button>
    <button class="btn ghost sm" id="cb-docx" title="Для Литрес">📄 Word</button>
    <button class="btn ghost sm" id="cb-epub" title="Для KDP">📗 EPUB</button>
    <button class="btn ghost sm" id="cb-next" title="Как опубликовать книгу">Что дальше?</button>
    <button class="btn ghost sm" id="cb-series-update" style="display:none">💾 Обновить Библию серии</button>
    <button class="icon-btn" id="cb-dismiss" title="Закрыть">✕</button>
  </div>
</div>
<div class="drawer-scrim" id="scrim"></div>
<section class="drawer" id="drawer" aria-hidden="true">
  <header class="drawer-head"><div class="drawer-title" id="drawer-title">—</div>
    <button class="icon-btn" id="drawer-close">✕</button></header>
  <div class="drawer-body" id="drawer-body"></div>
</section>
<aside class="node-panel" id="node-panel" aria-hidden="true"></aside>

<div class="toast" id="toast"></div>

<!-- ═══ CANVAS TOOLBAR ═══ -->
<div class="ctb" id="ctb">
  <button class="ctb-btn active" data-tool="select">↖<div class="ctb-tip"><div class="ctb-ti"><b>Выбор</b><p>Перетаскивать узлы</p><kbd>V</kbd></div></div></button>
  <button class="ctb-btn" data-tool="pan">✋<div class="ctb-tip"><div class="ctb-ti"><b>Навигация</b><p>Прокручивать доску</p><kbd>H</kbd></div></div></button>
  <div class="ctb-sep"></div>
  <button class="ctb-btn ctb-add-btn" data-tool="add">⊕<div class="ctb-tip"><div class="ctb-ti"><b>Агенты</b><p>Открыть палитру агентов</p><kbd>A</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-branch"><span style="color:#60a5fa">⎇</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#60a5fa">Ветвь</b><p>Параллельные потоки</p><kbd>B</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-condition"><span style="color:#fbbf24">◇</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#fbbf24">Условие</b><p>if / else развилка</p><kbd>C</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-loop"><span style="color:#f87171">↻</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#f87171">Повтор</b><p>Цикл до N итераций</p><kbd>L</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-gate"><span style="color:#34d399">⏸</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#34d399">Ожидание</b><p>Пауза для одобрения</p><kbd>G</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-note"><span style="color:#8d92a8">✏</span><div class="ctb-tip"><div class="ctb-ti"><b>Заметка</b><p>Аннотация, не выполняется</p><kbd>N</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-merge"><span style="color:#19d3c5">⬡</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#19d3c5">Слияние</b><p>Объединить параллельные потоки</p><kbd>M</kbd></div></div></button>
  <button class="ctb-btn" data-tool="add-decision"><span style="color:#fbbf24">🔔</span><div class="ctb-tip"><div class="ctb-ti"><b style="color:#fbbf24">Согласование</b><p>Спросить решение у человека</p></div></div></button>
  <div class="ctb-sep"></div>
  <button class="ctb-btn" data-tool="layout-chain">⤢<div class="ctb-tip"><div class="ctb-ti"><b>Цепочка</b><p>Выстроить узлы в линию</p></div></div></button>
  <button class="ctb-btn" data-tool="layout-tree">⊤<div class="ctb-tip"><div class="ctb-ti"><b>Дерево</b><p>Иерархия по уровням</p></div></div></button>
  <button class="ctb-btn" data-tool="fit-screen">⊙<div class="ctb-tip"><div class="ctb-ti"><b>Вместить</b><p>Все узлы на экран</p><kbd>F</kbd></div></div></button>
  <button class="ctb-btn" id="ctb-snap" data-tool="snap">⊞<div class="ctb-tip"><div class="ctb-ti"><b>Сетка</b><p>Привязка к точкам 26px</p></div></div></button>
  <div class="ctb-sep"></div>
  <button class="ctb-btn" data-tool="zoom-in">＋<div class="ctb-tip"><div class="ctb-ti"><b>Увеличить</b><p>Масштаб +20%</p><kbd>+</kbd></div></div></button>
  <button class="ctb-btn ctb-zlbl" id="ctb-zoom-lbl" data-tool="zoom-reset">100%<div class="ctb-tip"><div class="ctb-ti"><b>Масштаб</b><p>Сбросить до 100%</p></div></div></button>
  <button class="ctb-btn" data-tool="zoom-out">－<div class="ctb-tip"><div class="ctb-ti"><b>Уменьшить</b><p>Масштаб −20%</p><kbd>−</kbd></div></div></button>
  <button class="ctb-btn" id="ctb-minimap-btn" data-tool="minimap">▤<div class="ctb-tip"><div class="ctb-ti"><b>Миникарта</b><p>Обзор всей доски</p></div></div></button>
</div>

<!-- Agent Palette -->
<div class="ctb-palette" id="ctb-palette"></div>

<!-- Minimap -->
<div class="minimap-wrap" id="minimap-wrap" style="display:none">
  <canvas id="minimap-canvas" width="150" height="96"></canvas>
  <div class="minimap-lbl">обзор доски</div>
</div>

<script src="app.js"></script>
</body>
</html>
